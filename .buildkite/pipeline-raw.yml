env:
  SET_VERSION: "export OCTEZ_VERSION=\"$(cat meta.json | jq -r '.tezos_ref' | cut -d'/' -f3)\""
  DOCKER_BUILDKIT: 1
  USE_NEWER_NIX: 1

steps:
 # We need to sign commits that update brew formulae separately
 - label: Sign formulae update commits
   if: build.branch =~ /^auto\/update-brew-formulae-.*/
   commands:
   - nix develop .#buildkite
       --command './scripts/sign-commits.sh'
 # To avoid race-conditions for the gpg key between jobs which sometimes leads to weird errors
 - wait

 - label: reuse lint
   command: nix shell .#reuse -c reuse lint
 - label: check trailing whitespace
   command: .buildkite/check-trailing-whitespace.sh
 - label: crossref-verify
   command: nix shell -f https://github.com/serokell/crossref-verifier/archive/68a1f9d25b6e7835fea8299b18a3e6c61dbb2a5c.tar.gz -c crossref-verify
   soft_fail: true
 - label: lint python code
   command: nix shell .#python39Packages.black -c black --check --diff --color .
 - label: lint bash scripts
   command: nix shell .#shellcheck -c shellcheck --shell=bash --exclude=SC1091 -x $(find . -name '*.sh')
 - label: pipeline-filtering
   command: nix develop .#buildkite --command 'nix shell .#bats -c ./tests/buildkite/filter-pipeline.bats'
   only_changes:
   - .buildkite/filter-pipeline.py
   - tests/buildkite/.*
 - label: check auto-inserting bottle hashes
   commands:
   - cd tests/bottle-hashes/
   - ./test-hash-insert.sh

 - label: Build Monterey x86_64 bottles
   key: build-bottles-monterey-x86_64
   agents:
     queue: "x86_64-rosetta-darwin"
   commands:
   - rm -rf /Users/serokell/Library/Caches/Homebrew/downloads/b3050b8d1d2bbd786c485462d44befe07e66eb214a3b8a7da232afd40209160d--protobuf-28.2.tar.gz
   - nix develop .#autorelease-macos -c ./scripts/build-all-bottles.sh "monterey"
   artifact_paths:
     - '*.bottle.*'
   retry:
     automatic:
       limit: 1

 - label: Build Monterey arm64 bottles
   key: build-bottles-monterey-arm64
   agents:
     queue: "arm64-darwin"
   commands:
   - nix develop .#autorelease-macos -c ./scripts/build-all-bottles.sh "arm64_monterey"
   artifact_paths:
     - '*.bottle.*'
   retry:
     automatic:
       limit: 1

 # We use the tag that triggered the pipeline here.
 # However, this requires that the tag and the release name are the same, which
 # in practice it's always the case in this repo.
 - label: Add Monterey bottle hashes to formulae
   depends_on:
   - "build-bottles-monterey-arm64"
   - "build-bottles-monterey-x86_64"
   commands:
   - mkdir -p "Monterey"
   - nix develop .#buildkite -c gh release download "v20.3-1" -D "Monterey/" -p "*monterey.bottle.tar.gz"
   - nix develop .#autorelease -c ./scripts/sync-bottle-hashes.sh "v20.3-1" "Monterey"
